<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qaia Star Chart</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #04081a;
      font-family: 'Courier New', Courier, monospace;
      color: rgba(190, 220, 255, 0.9);
      overflow: auto;
    }
    #chart-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      padding: 40px 10px 10px;
    }
    .chart-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      flex: 1 1 0;
      min-width: 280px;
    }
    .chart-wrap svg {
      width: 100%;
      height: auto;
      max-height: calc(100vh - 70px);
    }
    .chart-wrap h2 {
      font-size: 14px;
      font-weight: normal;
      color: rgba(150, 210, 255, 0.88);
      letter-spacing: 0.06em;
    }
    .save-btn {
      margin-top: 6px;
      background: rgba(20, 45, 100, 0.75);
      border: 1px solid rgba(80, 130, 220, 0.3);
      color: rgba(180, 215, 255, 0.88);
      padding: 4px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      border-radius: 4px;
    }
    .save-btn:hover {
      background: rgba(40, 80, 160, 0.85);
      border-color: rgba(120, 180, 255, 0.5);
    }
    #back-link {
      position: fixed;
      top: 12px;
      left: 14px;
      font-size: 12px;
      color: rgba(150, 195, 240, 0.7);
      text-decoration: none;
      z-index: 10;
    }
    #back-link:hover { color: rgba(180, 220, 255, 0.95); }
  </style>
</head>
<body>
  <a id="back-link" href="index.html">&larr; Simulation</a>
  <div id="chart-container">
    <div class="chart-wrap">
      <h2>Northern Hemisphere</h2>
      <div id="north-chart"></div>
    </div>
    <div class="chart-wrap">
      <h2>Southern Hemisphere</h2>
      <div id="south-chart"></div>
    </div>
  </div>
  <script type="module" src="starchart.js"></script>
</body>
</html>
